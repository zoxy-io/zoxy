name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the pinned toolchain from the flake so CI matches local dev exactly
      # (zig_0_16 + zls), served from the Nix binary cache.
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: >-
          nix develop --command zig fmt --check
          src build.zig scripts/check_line_length.zig scripts/config_tool.zig

      # zig fmt does not enforce line width; TigerStyle mandates a hard 100-column
      # limit (docs/TIGER_STYLE.md). Enforced by a Zig tool so local
      # `zig build lint` and CI share one implementation (scripts/check_line_length.zig).
      - name: Check line length (100-column hard limit)
        run: nix develop --command zig build lint

      # The config JSON Schema is derived from the DTO; this gate fails if it was
      # not regenerated (`zig build schema`) and strict-parses zoxy.json
      # (docs/DESIGN.md §7 Phase 6, slice 1).
      - name: Check config (schema drift + strict parse)
        run: nix develop --command zig build check-config

      - name: Build
        run: nix develop --command zig build

      - name: Run tests
        run: nix develop --command zig build test --summary all

      # Deterministic simulation: the real data path on the simulation IO
      # backend under seeded adversarial schedules. Fixed seed range so any
      # failure reproduces locally with `zig build sim -- <seed> 1`.
      - name: Run simulator (seeds 0..300)
        run: nix develop --command zig build sim -- 0 300

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # kcov over the unit tests + a simulator sweep (see scripts/coverage.sh
      # for the -fllvm gotcha).
      - name: Measure coverage (kcov)
        run: nix develop --command scripts/coverage.sh

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: zig-out/coverage/merged/kcov-merged/cobertura.xml
          format: cobertura
