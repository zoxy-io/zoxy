name: CI

on:
  push:
    branches: [main, libxev]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: test, lint & sim (${{ matrix.os }})
    # Linux is the production target (io_uring); macOS exercises the
    # kqueue backend so local-bench portability cannot silently regress —
    # its failure modes (e.g. close ops requiring a thread pool) only
    # surface at runtime, which a cross-compile check would miss.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Single-user install (the runner owns /nix), which cache-nix-action
      # requires: the daemon install cachix/install-nix-action does leaves
      # /nix root-owned, so restoring the store as the runner fails with
      # "Cannot mkdir: Permission denied" and silently degrades to a miss.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      # Serve prebuilt devenv from the public binary cache instead of
      # building it from source — the macOS `nix profile install` was the
      # single slowest step (3m37s → ~30s). Pull-only: no auth token.
      #
      # A /nix/store cache (cache-nix-action) was measured and dropped: on
      # macOS restoring the ~950 MB store took longer than the install it
      # replaced (net slower), and on Linux it was a wash — the fast
      # single-user install plus this cache already do the work.
      - name: Set up devenv binary cache
        uses: cachix/cachix-action@v17
        with:
          name: devenv
          skipPush: true

      # Pin devenv to a fixed release (matches local dev, 2.1.2) instead of the
      # drifting `nixpkgs#devenv`, so every run resolves the same devenv binary;
      # --accept-flake-config lets it pull prebuilt from devenv.cachix.org.
      - name: Install devenv
        run: nix profile install --accept-flake-config github:cachix/devenv/v2.1.2

      # zig-pkg (vendored, hash-pinned deps) is deliberately not checked.
      - name: Check formatting
        run: devenv shell -- zig fmt --check build.zig src bench sim scripts

      - name: Build
        run: devenv shell -- zig build

      # The per-change gates (DESIGN.md §9): unit tests, the fd-boundary
      # lint, and the deterministic simulator (failures replay locally with
      # `zig build sim -- <seed> 1`). The Tier-1 bench is deliberately
      # excluded — its verdict is a band comparison against a real origin
      # at merge, not a blind shared-runner pass.
      - name: Run gates (test + lint + sim)
        run: devenv shell -- zig build ci --summary all

  coverage:
    name: coverage
    # kcov is Linux-only (devenv.nix); the merged report is the unit tests
    # plus a simulator sweep, which reaches error paths unit tests cannot.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Set up devenv binary cache
        uses: cachix/cachix-action@v17
        with:
          name: devenv
          skipPush: true

      - name: Install devenv
        run: nix profile install --accept-flake-config github:cachix/devenv/v2.1.2

      - name: Measure coverage (kcov)
        run: devenv shell -- zig build coverage

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: zig-out/coverage/kcov-merged/cobertura.xml
          format: cobertura
